<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANCER // Talent Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060a0f;--panel:#0b1118;--panel2:#0d1520;
  --border:#1a2d3f;--border2:#1e3348;
  --accent:#00d4ff;--text:#c8dce8;--text-dim:#4a6880;--text-bright:#eaf4ff;
  --gms:#7ec8e3;--ipsn:#ff9f43;--ssc:#a29bfe;--horus:#55efc4;--ha:#fd79a8;
  --warn:#ffd700;--success:#39ff14;--danger:#ff4444;
  --r1:#4a6880;--r2:#00d4ff;--r3:#ffd700;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Exo 2",sans-serif;font-weight:300;min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);pointer-events:none;z-index:9999;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 24px 80px;}
header{padding:40px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px;position:relative;}
header::after{content:"";position:absolute;bottom:-1px;left:0;width:240px;height:2px;background:linear-gradient(90deg,var(--ssc),transparent);}
.logo-mark{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--ssc);letter-spacing:4px;opacity:.6;margin-bottom:6px;text-transform:uppercase;}
h1{font-family:"Exo 2",sans-serif;font-weight:900;font-size:clamp(1.8rem,4vw,3rem);line-height:1;letter-spacing:-1px;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,var(--ssc) 60%,#7060cc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-family:"Share Tech Mono",monospace;font-size:11px;color:var(--text-dim);letter-spacing:3px;margin-top:8px;text-transform:uppercase;}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.filter-label{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}
.filter-btn{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s;}
.filter-btn:hover{color:var(--ssc);border-color:var(--ssc);}
.filter-btn.active{background:rgba(162,155,254,.1);color:var(--ssc);border-color:var(--ssc);}
.filter-btn.f-combat.active{background:rgba(255,159,67,.1);color:var(--ipsn);border-color:var(--ipsn);}
.filter-btn.f-tech.active{background:rgba(0,212,255,.1);color:var(--accent);border-color:var(--accent);}
.filter-btn.f-reactor.active{background:rgba(255,68,68,.1);color:var(--danger);border-color:var(--danger);}
.filter-btn.f-mob.active{background:rgba(57,255,20,.1);color:var(--success);border-color:var(--success);}
.filter-btn.f-drone.active{background:rgba(85,239,196,.1);color:var(--horus);border-color:var(--horus);}
.filter-btn.f-sup.active{background:rgba(253,121,168,.1);color:var(--ha);border-color:var(--ha);}
.filter-btn.f-util.active{background:rgba(255,215,0,.1);color:var(--warn);border-color:var(--warn);}
.search-box{font-family:"Share Tech Mono",monospace;font-size:12px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 12px;outline:none;width:240px;}
.search-box::placeholder{color:var(--text-dim);}
.search-box:focus{border-color:var(--ssc);}
.result-count{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--text-dim);margin-left:auto;letter-spacing:2px;}
.result-count span{color:var(--ssc);}

/* TALENT CARDS GRID */
.talent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;}
.talent-card{background:var(--panel);border:1px solid var(--border);display:flex;flex-direction:column;transition:border-color .2s;}
.talent-card:hover{border-color:var(--border2);}
.talent-card.hidden{display:none;}
.tc-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;justify-content:space-between;}
.tc-name{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:var(--text-bright);}
.tc-category{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:1.5px;padding:2px 6px;border-radius:2px;text-transform:uppercase;border:1px solid currentColor;white-space:nowrap;margin-top:3px;}
.cat-combat{color:var(--ipsn);background:rgba(255,159,67,.07);}
.cat-tech{color:var(--accent);background:rgba(0,212,255,.07);}
.cat-reactor{color:var(--danger);background:rgba(255,68,68,.07);}
.cat-mob{color:var(--success);background:rgba(57,255,20,.07);}
.cat-drone{color:var(--horus);background:rgba(85,239,196,.07);}
.cat-sup{color:var(--ha);background:rgba(253,121,168,.07);}
.cat-util{color:var(--warn);background:rgba(255,215,0,.07);}
.tc-flavor{font-size:11px;color:var(--text-dim);line-height:1.6;padding:10px 18px;font-style:italic;border-bottom:1px solid var(--border);}
.tc-ranks{padding:12px 18px;display:flex;flex-direction:column;gap:0;flex:1;}
.rank-block{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.rank-block:last-child{border-bottom:none;}
.rank-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rank-num{font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:2px;padding:2px 7px;border-radius:2px;text-transform:uppercase;white-space:nowrap;}
.rank-I{color:var(--r1);border:1px solid var(--r1);background:rgba(74,104,128,.1);}
.rank-II{color:var(--r2);border:1px solid var(--r2);background:rgba(0,212,255,.07);}
.rank-III{color:var(--r3);border:1px solid var(--r3);background:rgba(255,215,0,.07);}
.rank-ability{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-bright);}
.rank-effect{font-size:12px;color:var(--text-dim);line-height:1.7;}
.rank-effect strong{color:var(--text);}
.rank-effect .react{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--warn);border:1px solid rgba(255,215,0,.3);padding:1px 5px;border-radius:2px;}
.rank-effect .weapon-gained{font-family:"Share Tech Mono",monospace;font-size:10px;color:var(--horus);background:rgba(85,239,196,.06);border:1px solid rgba(85,239,196,.2);padding:6px 8px;display:block;margin-top:6px;line-height:1.5;}

/* NO RESULTS */
.no-results{text-align:center;padding:60px;font-family:"Share Tech Mono",monospace;font-size:12px;color:var(--text-dim);letter-spacing:2px;display:none;}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrapper">
<header>
  <div class="logo-mark">Section 4 // Compendium // Pilot Talents</div>
  <h1>Talent Reference</h1>
  <div class="subtitle">All 24 Pilot Talents &mdash; Ranks I, II &amp; III with Full Ability Text</div>
</header>

<div class="controls">
  <span class="filter-label">Category:</span>
  <button class="filter-btn active" data-cat="all"     onclick="setF(this,'all')">All</button>
  <button class="filter-btn f-combat"  data-cat="combat"  onclick="setF(this,'combat')">Combat</button>
  <button class="filter-btn f-tech"    data-cat="tech"    onclick="setF(this,'tech')">Tech / E-War</button>
  <button class="filter-btn f-reactor" data-cat="reactor" onclick="setF(this,'reactor')">Reactor / DZ</button>
  <button class="filter-btn f-mob"     data-cat="mob"     onclick="setF(this,'mob')">Mobility</button>
  <button class="filter-btn f-drone"   data-cat="drone"   onclick="setF(this,'drone')">Drone</button>
  <button class="filter-btn f-sup"     data-cat="sup"     onclick="setF(this,'sup')">Support / Leadership</button>
  <button class="filter-btn f-util"    data-cat="util"    onclick="setF(this,'util')">Utility</button>
  <input type="text" class="search-box" placeholder="Search talents and abilities..." oninput="doSearch(this.value)">
  <div class="result-count">Showing <span id="count">0</span> talents</div>
</div>

<div class="talent-grid" id="grid"></div>
<div class="no-results" id="nores">NO TALENTS MATCH CURRENT FILTERS</div>

</div>
<script>
// Talent data: {name, cat, flavor, ranks: [{num, ability, effect}]}
// cat: combat|tech|reactor|mob|drone|sup|util
// rank num: "I"|"II"|"III"
const T = [

   ranks:[

    {num:"II", ability:"Afterburners", effect:"When you BOOST while flying, move an additional <strong>1d6 spaces</strong>, but take heat equal to half that amount."},
    {num:"III",ability:"Supersonic", effect:"Quick action: spin up thrusters. If you end your turn flying, nominate a character within RANGE = SPEED and LoS. Gain the <strong>Supersonic</strong> reaction (1/round): <span class='react'>Trigger: your nominated target&apos;s turn ends. Effect: fly to a free space adjacent to them, ignoring engagement, no reactions.</span>"}
  ]},
  {name:"Bonded", cat:"sup", flavor:"You have found your bondmate — alone you are deadly; together you are a force of nature.",
   ranks:[
    {num:"I",  ability:"I'm Your Huckleberry", effect:"Choose a BONDMATE (ideally another PC). All mech skill checks and saves either character makes while adjacent gain <strong>+1 Accuracy</strong>. If both have this talent: +2 Accuracy (doesn't stack further). Bondmate can be changed between missions if the relationship has changed."},
    {num:"II", ability:"Sundance", effect:"Gain the <strong>Intercede</strong> reaction (1/round): <span class='react'>Trigger: you are adjacent to your bondmate and they take damage from a source within your LoS. Effect: you take the damage instead.</span>"},

  {name:"Brawler", cat:"combat", flavor:"Up close and personal — the way battle was done since the dawn of time.",

    {num:"II", ability:"Sledgehammer", effect:"Your <strong>IMPROVISED ATTACKS</strong> gain KNOCKBACK 2 and deal <strong>2d6+2 kinetic</strong>."},

    {num:"II", ability:"Cull the Herd", effect:"Your <strong>critical hits</strong> gain <strong>KNOCKBACK 1</strong>."},
    {num:"III",ability:"Relentless", effect:"When you miss with an attack, your <strong>next attack</strong> gains +1 Accuracy. This stacks and persists until you hit."}

  {name:"Centimane", cat:"drone", flavor:"The Hundred Hands — agents of the Karrakin Royal Intelligence Service.",

  ]},
  {name:"Combined Arms", cat:"combat", flavor:"True strength comes from knowing how to use both the blade and the gun.",
   ranks:[
    {num:"I",  ability:"Shield of Blades", effect:"While ENGAGED, you and any <strong>allies adjacent to you</strong> count as having <strong>soft cover</strong>."},

  {name:"Drone Commander", cat:"drone", flavor:"Her swarm obeys almost before she orders — an unnerving development, but a useful one.",

  {name:"Duelist", cat:"combat", flavor:"With a blade in your hand, you write old tales anew.",

  ]},
  {name:"Engineer", cat:"util", flavor:"In your spare time, you have managed to apply a little old-fashioned ingenuity to your mech.",

    {num:"II", ability:"Revision", effect:"On Full Repair, choose two upgrades for your prototype: <strong>Tweaked Optics</strong> (+1 Accuracy always), <strong>Tweaked Computer</strong> (gains SMART), or <strong>Stripped Reactor Shielding</strong> (pay 2 heat — ranged: Burst 3, Blast 5, or Line 1; melee: Line 1)."},

  {name:"Executioner", cat:"combat", flavor:"No one lives forever — you make sure of it.",

    {num:"III",ability:"No Escape", effect:"1/round, when you <strong>miss with a melee attack</strong>, reroll it against a <strong>different target</strong> within THREAT and LoS."}
  ]},

const catCls = {combat:"cat-combat",tech:"cat-tech",reactor:"cat-reactor",mob:"cat-mob",drone:"cat-drone",sup:"cat-sup",util:"cat-util"};
const catLabel = {combat:"Combat",tech:"Tech / E-War",reactor:"Reactor / DZ",mob:"Mobility",drone:"Drone",sup:"Support",util:"Utility"};
const rankCls = {I:"rank-I",II:"rank-II",III:"rank-III"};

const grid = document.getElementById("grid");
T.forEach(t => {
  const card = document.createElement("div");
  card.className = "talent-card";
  card.dataset.cat = t.cat;
  card.dataset.search = [t.name, t.cat, t.flavor, ...t.ranks.map(r => r.ability + " " + r.effect)].join(" ").toLowerCase();
  card.innerHTML = `
    <div class="tc-header">
      <div>
        <div class="tc-name">${t.name}</div>
        <span class="tc-category ${catCls[t.cat]}">${catLabel[t.cat]}</span>
      </div>
    </div>
    <div class="tc-flavor">${t.flavor}</div>
    <div class="tc-ranks">
      ${t.ranks.map(r => `
        <div class="rank-block">
          <div class="rank-header">
            <span class="rank-num ${rankCls[r.num]}">Rank ${r.num}</span>
            <span class="rank-ability">${r.ability}</span>
          </div>
          <div class="rank-effect">${r.effect}</div>
        </div>`).join("")}
    </div>`;
  grid.appendChild(card);
});

let fCat = "all", fSearch = "";
function setF(btn, cat) {
  fCat = cat;
  document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}
function doSearch(v) { fSearch = v.trim().toLowerCase(); applyFilters(); }
function applyFilters() {
  let n = 0;
  document.querySelectorAll(".talent-card").forEach(c => {
    const mc = fCat === "all" || c.dataset.cat === fCat;
    const mq = !fSearch || c.dataset.search.includes(fSearch);
    const show = mc && mq;
    c.classList.toggle("hidden", !show);
    if (show) n++;
  });
  document.getElementById("count").textContent = n;
  document.getElementById("nores").style.display = n === 0 ? "block" : "none";
}
applyFilters();
</script>
